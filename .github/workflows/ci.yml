# CI - Lint & Type Check
name: CI - Lint & Type Check

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: |
          cd sagun-moldify-api
          npm ci

      - name: Run ESLint
        run: |
          cd sagun-moldify-api
          npm run lint || true

      - name: Run TypeScript type check
        run: |
          cd sagun-moldify-api
          npm run typecheck
