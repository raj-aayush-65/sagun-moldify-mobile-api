name: API Keep-Alive

on:
  schedule:
    # Run every 14 minutes to keep Render API alive
    # Render spins down after 15 minutes of inactivity
    - cron: '*/14 * * * *'
  workflow_dispatch:
    # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Beta API
        run: |
          echo "Pinging Beta API..."
          response=$(curl -s -o /dev/null -w "%{http_code}" https://sagun-moldify-mobile-api.onrender.com/api/v1/health || echo "000")
          echo "Beta API Response: $response"

          if [ "$response" = "200" ]; then
            echo "✅ Beta API is alive"
          else
            echo "❌ Beta API returned: $response"
            exit 1
          fi
